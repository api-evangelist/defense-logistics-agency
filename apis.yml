aid: defense-logistics-agency
name: Defense Logistics Agency
description: >-
  The Defense Logistics Agency (DLA) is the U.S. Department of Defense combat
  support agency that manages a global supply chain spanning roughly five
  million items in nine supply chains plus storage, distribution, fuel,
  construction, and disposition missions. DLA operates an extensive catalog of
  business applications used by suppliers, the military services, and federal
  partners. Most DLA applications require account registration and operate
  behind authentication; public-facing surfaces include the DLA Internet Bid
  Board System (DIBBS), the DLA Disposition Services storefront, the FedMall
  procurement marketplace, and federated logistics search tools.
