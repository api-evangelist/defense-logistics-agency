apis:
  - aid: defense-logistics-agency:defense-logistics-agency-applications
    name: DLA Applications Catalog
    description: >-
      Comprehensive list of DLA business applications used to work with the
      agency, including supply, contracting, distribution, disposition, fuel,
      and energy systems. The catalog provides links, contacts, and outage
      notices but does not itself expose a developer API.
    humanURL: https://www.dla.mil/Working-With-DLA/Applications
    tags:
      - Applications
      - Catalog
    properties:
      - type: Documentation
        url: https://www.dla.mil/Working-With-DLA/Applications
  - aid: defense-logistics-agency:defense-logistics-agency-dibbs
    name: DLA Internet Bid Board System (DIBBS)
    description: >-
      Web-based application used by the Defense Logistics Agency to post
      requests for quote, solicitations, awards, and modifications for
      contracted supplies. Suppliers register for accounts and respond to
      solicitations through the DIBBS portal.
    humanURL: https://www.dibbs.bsm.dla.mil
    tags:
      - Bidding
      - Contracting
      - Procurement
      - Solicitations
    properties:
      - type: Documentation
        url: https://www.dibbs.bsm.dla.mil
  - aid: defense-logistics-agency:defense-logistics-agency-disposition-services
    name: DLA Disposition Services
    description: >-
      Online presence and storefronts for DLA Disposition Services that
      handle the reuse, transfer, donation, sale, and disposal of excess
      Department of Defense property, including the GovPlanet sales
      partnership and the LSDDS data services for property tracking.
    humanURL: https://www.dla.mil/Disposition-Services
    tags:
      - Disposal
      - Property
      - Reuse
      - Sales
    properties:
      - type: Documentation
        url: https://www.dla.mil/Disposition-Services
  - aid: defense-logistics-agency:defense-logistics-agency-fedmall
    name: FedMall
    description: >-
      DoD procurement marketplace operated by DLA where authorized buyers
      from federal, state, local, tribal, and authorized contractor
      communities purchase commercial off-the-shelf goods. FedMall provides
      catalog ingestion and order management interfaces for participating
      suppliers.
    humanURL: https://www.fedmall.mil
    tags:
      - eCommerce
      - Marketplace
      - Procurement
    properties:
      - type: Documentation
        url: https://www.fedmall.mil
  - aid: defense-logistics-agency:defense-logistics-agency-energy
    name: DLA Energy
    description: >-
      DLA business unit that supplies fuel and aerospace energy products to
      the U.S. military and federal customers. Public-facing surfaces
      include the Energy customer portal and contracting bulletins.
    humanURL: https://www.dla.mil/Energy
    tags:
      - Aerospace
      - Energy
      - Fuel
    properties:
      - type: Documentation
        url: https://www.dla.mil/Energy
